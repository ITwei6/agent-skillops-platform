openapi: 3.0.3
info:
  title: Agent SkillOps Gateway API
  version: 0.1.0
paths:
  /healthz:
    get:
      summary: Gateway health check
      responses:
        "200":
          description: Gateway is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/v1/ping:
    get:
      summary: Gateway ping endpoint
      responses:
        "200":
          description: Ping response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/v1/users:
    post:
      summary: Create a user in the current team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "200":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/v1/users/me:
    get:
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/v1/projects:
    get:
      summary: List projects
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Project page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
    post:
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "200":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/v1/projects/{project_id}:
    get:
      summary: Get project detail
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
components:
  schemas:
    Envelope:
      type: object
      required:
        - code
        - message
        - request_id
        - data
      properties:
        code:
          type: string
          example: OK
        message:
          type: string
          example: success
        request_id:
          type: string
          example: req_1
        data:
          type: object
    CreateUserRequest:
      type: object
      required:
        - team_id
        - name
        - email
        - role
      properties:
        team_id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
    CreateProjectRequest:
      type: object
      required:
        - team_id
        - name
      properties:
        team_id:
          type: string
        name:
          type: string
        description:
          type: string
        repo_url:
          type: string
        created_by:
          type: string
